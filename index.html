<html lang="en">
<head>

  <title>Employment Documents</title>
</head>
<body>

  </select>

  <!-- Cards -->
  <div class="card" data-employee="srikanth" data-company="oracle">
    <h3>Oracle</h3>
    <div class="doc-links">
      <a href="#">Offer Letter</a>
      <a href="#">Relieving Letter</a>
      <a href="#">Experience Letter</a>
      <a href="#">Resignation Letter</a>
      <a href="#">Revision Letter</a>
      <a href="#">Payslips</a>
    </div>
  </div>

  <div class="card" data-employee="john" data-company="united">
    <h3>United Online</h3>
    <div class="doc-links">
      <a href="#">Offer Letter</a>
      <a href="#">Relieving Letter</a>
      <a href="#">Experience Letter</a>
      <a href="#">Resignation Letter</a>
      <a href="#">Revision Letter</a>
      <a href="#">Payslips</a>
    </div>
  </div>

  <!-- Single script reference -->
  <script src="docs-links.js"></script>
</body>
</html>
