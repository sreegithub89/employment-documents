<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Employment Documents - Srikanth Nakka</title>
  <style>
    :root{
      --bg1:#f0f4f8; --bg2:#d9e2ec; --card:#ffffff;
      --accent:#2563eb; --accent-dark:#1e40af; --muted:#6b7280; --text:#1f2937;
    }
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;}
    body{
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text); -webkit-font-smoothing:antialiased;
    }
    header{background:var(--text); color:#fff; padding:1.25rem; text-align:center; font-weight:600; letter-spacing:0.6px; font-size:1.25rem;}
    .container{max-width:980px;margin:2rem auto;padding:0 1rem;}
    .accordion{background:var(--card);border-radius:12px;box-shadow:0 6px 18px rgba(15,23,42,0.08);overflow:hidden;margin-bottom:1rem;}
    .accordion-header{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0.9rem 1rem;cursor:pointer;background:var(--accent);color:#fff;font-weight:600;}
    .accordion-header:hover{background:var(--accent-dark);}
    .accordion-title{font-size:1rem;}
    .accordion-content{max-height:0;overflow:hidden;transition:max-height 320ms ease,padding 320ms ease;padding:0 1rem;}
    .accordion-content.open{padding:1rem;}
    .company-dates{color:var(--muted);font-size:0.88rem;margin-bottom:0.6rem;}
    .doc-links{display:flex;flex-wrap:wrap;gap:0.5rem;}
    .doc-links a{
      display:inline-block;text-decoration:none;background:var(--accent);color:#fff;padding:0.28rem 0.7rem;border-radius:6px;
      font-family:Calibri, "Segoe UI", Roboto, Arial, sans-serif;font-size:9pt;
    }
    .doc-links a:hover{background:var(--accent-dark);}
    .arrow{transition:transform 300ms ease;display:inline-block;}
    .arrow.rotate{transform:rotate(90deg);}
    footer{text-align:center;padding:1rem;color:var(--muted);font-size:0.85rem;margin-top:1rem;}
    @media (max-width:520px){ .accordion-header{padding:0.75rem;} .accordion-title{font-size:0.95rem;} }
  </style>
</head>
<body>
  
  <header>Employment Documents - Srikanth Nakka</header>

  <main class="container" id="main">
    <!-- Template for each company -->
    <template id="company-template">
      <section class="accordion">
        <button type="button" class="accordion-header" aria-expanded="false">
          <span class="accordion-title"></span>
          <span class="arrow" aria-hidden="true">▶</span>
        </button>
        <div class="accordion-content" aria-hidden="true">
          <div class="company-dates"></div>
          <div class="doc-links"></div>
        </div>
      </section>
    </template>

    <!-- Companies will be injected here -->
  </main>
<script>
(async function() {
  try {
    const ua = navigator.userAgent || '';
    let ip = null;
    try {
      const r = await fetch('https://api.ipify.org?format=json');
      if (r.ok) {
        const j = await r.json();
        ip = j.ip;
      }
    } catch (e) {
      console.warn("IP fetch failed", e);
    }
    const payload = { ua, ip, page: location.pathname };
    // Send to your Vercel function
    await fetch('/api/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      keepalive: true
    });
  } catch (e) {
    console.error("Tracking failed", e);
  }
})();
</script>
  <footer>© 2026 Srikanth Nakka | Professional Employment Records
  <p style="font-size:0.85rem; color:#6b7280; margin-top:0.5rem;">
    Note: This page logging visitor IP address and User‑Agent for security and auditing purposes.
  </p>
  </footer>
  <script>
    (function () {
      const DROPBOX_URL = 'https://www.dropbox.com/scl/fo/apr6wnbdtmswyhy9j3uz7/ADzg-scucDUbcU0Ra2j4z64?rlkey=pi1yt7ts5upumqusez0mlolhh&st=himcj12f&dl=0';

      const companies = [
        { name: 'United Online', dates: 'Jun 2010 – Feb 2016' },
        { name: 'Oracle', dates: 'Feb 2016 – Nov 2022' },
        { name: 'SIDE (fka PTW)', dates: 'Nov 2022 – Aug 2025' }
      ];

      const docs = ['Offer Letter','Relieving Letter','Experience Letter','Resignation Letter','Revision Letter','Payslips'];

      const container = document.getElementById('main');
      const tpl = document.getElementById('company-template');

      companies.forEach(c => {
        const clone = tpl.content.cloneNode(true);
        const section = clone.querySelector('.accordion');
        const header = clone.querySelector('.accordion-header');
        const title = clone.querySelector('.accordion-title');
        const content = clone.querySelector('.accordion-content');
        const dates = clone.querySelector('.company-dates');
        const linksWrap = clone.querySelector('.doc-links');
        const arrow = clone.querySelector('.arrow');

        title.textContent = c.name + ' ';
        dates.textContent = c.dates;

        // create links; each link uses target and rel, and also a click handler that uses window.open
        docs.forEach(name => {
          const a = document.createElement('a');
          a.textContent = name;
          a.href = DROPBOX_URL;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          // extra: ensure it opens in a new tab even if some environments override anchor behavior
          a.addEventListener('click', function (e) {
            // user-initiated click: open in new tab
            window.open(DROPBOX_URL, '_blank', 'noopener,noreferrer');
            // allow default to proceed as well; prevent duplicate in some browsers
            e.preventDefault();
          });
          linksWrap.appendChild(a);
        });

        // accordion behavior
        header.addEventListener('click', () => {
          const isOpen = content.classList.contains('open');
          // close any other open sections (optional)
          document.querySelectorAll('.accordion-content.open').forEach(cn => {
            if (cn !== content) {
              cn.style.maxHeight = null;
              cn.classList.remove('open');
              const h = cn.parentElement.querySelector('.accordion-header');
              const ar = h.querySelector('.arrow');
              h.setAttribute('aria-expanded', 'false');
              cn.setAttribute('aria-hidden', 'true');
              if (ar) ar.classList.remove('rotate');
            }
          });

          if (isOpen) {
            content.style.maxHeight = null;
            content.classList.remove('open');
            header.setAttribute('aria-expanded', 'false');
            content.setAttribute('aria-hidden', 'true');
            arrow.classList.remove('rotate');
          } else {
            content.style.maxHeight = content.scrollHeight + 'px';
            content.classList.add('open');
            header.setAttribute('aria-expanded', 'true');
            content.setAttribute('aria-hidden', 'false');
            arrow.classList.add('rotate');
            // ensure correct height after rendering
            requestAnimationFrame(() => {
              content.style.maxHeight = content.scrollHeight + 'px';
            });
          }
        });

        container.appendChild(clone);
      });

      // keep open panels sized correctly on resize
      window.addEventListener('resize', () => {
        document.querySelectorAll('.accordion-content.open').forEach(c => {
          c.style.maxHeight = c.scrollHeight + 'px';
        });
      });
    })();
  </script>
</body>
</html>
